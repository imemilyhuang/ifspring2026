  <body data-new-gr-c-s-check-loaded="14.1277.0" data-gr-ext-installed="">
    <main>
      <h1>Button Styling — Emily Huang</h1>

      <div class="button_container">
        <a href="http://www.spotify.com/" target="_blank" id="btn_spotify">Spotify</a>
      </div>

      <div class="button_container">
        <a href="http://www.amazon.com/" target="_blank" id="btn_amazon"
          ><i class="fa-brands fa-amazon"></i
        ></a>
      </div>

      <div class="button_container">
        <a href="http://www.twitter.com/" target="_blank" id="btn_twitter">twitter</a>
      </div>

      <div class="button_container">
        <a href="http://www.indiegogo.com/" target="_blank" id="btn_indiegogo"><span>indiegogo</span></a>
      </div>

      <div class="button_container">
        <a href="https://www.instagram.com/" target="_blank" class="instagram">Instagram</a>
      </div>

      <div class="button_container">
        <a href="https://www.apple.com" target="_blank" class="apple"
          ><i class="fa-brands fa-apple"></i> Apple</a
        >
      </div>

      <div class="button_container">
        <a href="https://www.teslamotors.com/" target="_blank" class="tesla" aria-label="Tesla">
          <span class="tesla-brand tesla-default">
            <i class="fa-solid fa-car-battery tesla-icon"></i>
            <span class="tesla-text">TESLA</span>
          </span>
          <span class="tesla-brand tesla-hover">
            <i class="fa-solid fa-car-battery tesla-icon"></i>
            <span class="tesla-text">TESLA</span>
          </span>
        </a>
      </div>

      <div class="button_container">
        <div class="hasbro-wrap">
          <img src="images/monopoly-man.png" alt="" class="hasbro-monopoly" />
          <a href="https://www.hasbro.com/" target="_blank" class="hasbro" aria-label="Hasbro">
            <span class="hasbro-logo">Hasbro</span>
          </a>
        </div>
      </div>

      <div class="button_container">
        <a href="https://www.lyft.com/" target="_blank" class="lyft">
          <i class="fa-solid fa-car car-icon"></i>
          <span class="btn-text">Lyft</span>
        </a>
      </div>
    </main>
  </body>
